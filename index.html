<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plemena Crne Gore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --crimson: #B01020;
      --gold:    #C9A227;
      --gold2:   #E8C84A;
      --cream:   #F0E5CC;
      --dark:    #0B0705;
      --glass:   rgba(10,6,4,0.88);
      --muted:   #7A6858;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:var(--dark); }

    /* ── CANVAS ── */
    canvas { position:fixed; inset:0; display:block; }

    /* ── TOP HUD ── */
    #hud {
      position: fixed; top:0; left:0; right:0; z-index:50;
      padding: 18px 24px;
      display: flex; align-items:center; justify-content:space-between;
      background: linear-gradient(to bottom, rgba(11,7,5,0.95) 60%, transparent);
      pointer-events: none;
    }

    .hud-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight:900;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold);
    }
    .hud-title span { color: var(--crimson); }

    .hud-hint {
      font-size: 0.65rem; letter-spacing:1.5px; text-transform:uppercase;
      color: var(--muted);
      transition: opacity 0.4s;
    }

    /* ── FILTER BAR ── */
    #filters {
      position: fixed; top: 56px; left:50%; transform:translateX(-50%);
      z-index:50;
      display: flex; gap:6px;
      pointer-events: auto;
    }

    .fpill {
      background: rgba(10,6,4,0.82);
      border: 1px solid rgba(201,162,39,0.22);
      color: var(--muted);
      padding: 5px 16px; border-radius:999px;
      font-size: 0.68rem; letter-spacing:1.2px; text-transform:uppercase;
      cursor: pointer; transition: all 0.2s; white-space:nowrap;
    }
    .fpill:hover, .fpill.on { border-color:var(--gold); color:var(--gold); background:rgba(201,162,39,0.1); }

    /* ── TRIBE HTML LABELS ── */
    .tlabel {
      position: fixed; transform: translate(-50%,-100%);
      text-align:center; pointer-events:auto; cursor:pointer;
      transition: opacity 0.3s;
      z-index: 30;
    }
    .tlabel .tdot {
      width:8px; height:8px; border-radius:50%;
      margin:0 auto 3px;
      box-shadow: 0 0 8px currentColor;
      transition: transform 0.2s;
    }
    .tlabel .tname {
      font-size:0.55rem; letter-spacing:1.2px; text-transform:uppercase;
      font-weight:500; opacity:0.75; white-space:nowrap;
    }
    .tlabel:hover .tdot { transform:scale(1.8); }
    .tlabel:hover .tname { opacity:1; }

    /* ── BOTTOM SHEET ── */
    #sheet {
      position: fixed; bottom:0; left:0; right:0; z-index:60;
      height: 58vh;
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction:column;
      background: var(--glass);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(201,162,39,0.2);
      border-radius: 20px 20px 0 0;
    }
    #sheet.open { transform: translateY(0); }

    /* Decorative top strip */
    .sheet-strip {
      height:5px; flex-shrink:0;
      border-radius:20px 20px 0 0;
      background: repeating-linear-gradient(
        90deg,
        var(--gold) 0,var(--gold) 12px,
        var(--crimson) 12px,var(--crimson) 24px,
        var(--gold) 24px,var(--gold) 36px,
        rgba(201,162,39,0.1) 36px,rgba(201,162,39,0.1) 48px
      );
    }

    /* Sheet header */
    .sheet-head {
      flex-shrink:0;
      padding: 16px 28px 12px;
      display:flex; align-items:flex-start; justify-content:space-between;
      border-bottom: 1px solid rgba(201,162,39,0.1);
    }

    .sheet-region {
      font-size:0.6rem; letter-spacing:2.5px; text-transform:uppercase;
      margin-bottom:4px;
    }

    .sheet-title {
      font-family:'Playfair Display', serif;
      font-size:1.8rem; font-weight:900; color:#fff; line-height:1;
    }

    .sheet-meta {
      font-size:0.72rem; color:var(--muted); margin-top:4px;
    }

    #sheet-close {
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      color:var(--muted); width:30px;height:30px;
      border-radius:8px; cursor:pointer; font-size:0.75rem;
      flex-shrink:0; margin-left:12px;
      transition: all 0.15s;
    }
    #sheet-close:hover { color:#fff; }

    /* Sheet body — scrollable */
    .sheet-body {
      flex:1; overflow-y:auto;
      padding:0 28px 40px;
      display:flex; flex-direction:column; gap:0;
      scroll-behavior:smooth;
    }
    .sheet-body::-webkit-scrollbar { width:3px; }
    .sheet-body::-webkit-scrollbar-thumb { background:var(--muted); border-radius:2px; }

    /* Summary */
    .sheet-summary {
      padding:16px 0;
      font-size:0.88rem; line-height:1.75; color:#8a7a6a;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }

    /* POI cards */
    .poi-card {
      padding:20px 0;
      border-bottom:1px solid rgba(255,255,255,0.05);
      display:flex; gap:16px; align-items:flex-start;
      transition: opacity 0.4s;
      opacity: 0.5;
    }
    .poi-card.focused { opacity:1; }

    .poi-icon {
      font-size:1.8rem; flex-shrink:0; margin-top:2px;
      filter: drop-shadow(0 0 8px rgba(201,162,39,0.4));
    }

    .poi-content { flex:1; }

    .poi-name {
      font-family:'Playfair Display', serif;
      font-size:1.1rem; font-weight:700; color:#fff;
      margin-bottom:4px;
    }

    .poi-desc {
      font-size:0.82rem; line-height:1.65; color:#7a6a5a;
    }

    .poi-coords {
      display:inline-block; margin-top:6px;
      font-size:0.6rem; letter-spacing:1px; text-transform:uppercase;
      color:var(--gold); opacity:0.6;
      font-family:'Inter', sans-serif;
    }

    /* Quote */
    .sheet-quote {
      margin:16px 0;
      border-left:3px solid var(--crimson);
      padding:10px 16px;
      background:rgba(176,16,32,0.06);
      border-radius:0 8px 8px 0;
      font-style:italic; color:#8a7a6a;
      font-size:0.85rem; line-height:1.6;
    }

    /* ── BACK BUTTON (when on map) ── */
    #back-btn {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%);
      z-index:40;
      background:rgba(10,6,4,0.85);
      border:1px solid rgba(201,162,39,0.3);
      color:var(--gold); font-size:0.68rem;
      letter-spacing:2px; text-transform:uppercase;
      padding:8px 20px; border-radius:999px;
      cursor:pointer;
      opacity:0; pointer-events:none;
      transition: opacity 0.3s;
    }
    #back-btn.visible { opacity:1; pointer-events:auto; }

    @media(max-width:600px){
      #sheet { height:70vh; }
      #filters { top:auto; bottom:20px; }
      .sheet-title { font-size:1.4rem; }
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<!-- TOP HUD -->
<div id="hud">
  <div class="hud-title">Plemena <span>Crne Gore</span></div>
  <div class="hud-hint" id="hint">Click a tribe to explore</div>
</div>

<!-- FILTERS -->
<div id="filters">
  <button class="fpill on" data-f="all">All</button>
  <button class="fpill" data-f="old-cg">Stara CG</button>
  <button class="fpill" data-f="brda">Brda</button>
  <button class="fpill" data-f="herc">Hercegovina</button>
  <button class="fpill" data-f="coast">Primorje</button>
</div>

<!-- HTML LABEL LAYER -->
<div id="labels"></div>

<!-- BOTTOM SHEET -->
<div id="sheet">
  <div class="sheet-strip" id="sheet-strip"></div>
  <div class="sheet-head">
    <div>
      <div class="sheet-region" id="s-region"></div>
      <div class="sheet-title" id="s-title"></div>
      <div class="sheet-meta" id="s-meta"></div>
    </div>
    <button id="sheet-close">✕</button>
  </div>
  <div class="sheet-body" id="s-body"></div>
</div>

<button id="back-btn">← Full Map</button>

];

//  THREE.JS SETUP
// ══════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0B0705);
scene.fog = new THREE.FogExp2(0x0B0705, 0.016);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 400);
camera.position.set(0, 32, 52);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.06;
controls.autoRotate=true; controls.autoRotateSpeed=0.3;
controls.enableZoom=true; controls.minDistance=18; controls.maxDistance=90;
controls.maxPolarAngle=Math.PI/2.1;
controls.target.set(0,0,0);

// ── LIGHTING ──────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a1008, 4));
const sun = new THREE.DirectionalLight(0xC9A227, 5);
sun.position.set(20,40,15); scene.add(sun);
scene.add(Object.assign(new THREE.DirectionalLight(0x4A7FC1, 1.5),{position: new THREE.Vector3(-30,15,-20)}));
scene.add(Object.assign(new THREE.DirectionalLight(0xC41E3A, 0.8),{position: new THREE.Vector3(10,5,-30)}));

// ── TERRAIN MATH ──────────────────────────────────────────────
function hash(n){return Math.sin(n*127.1)*43758.5453;}
function fract(n){return n-Math.floor(n);}
function n2(x,y){
  const ix=Math.floor(x),iy=Math.floor(y),fx=fract(x),fy=fract(y);
  const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
  return fract(hash(ix+iy*57)+(fract(hash(ix+1+iy*57))-fract(hash(ix+iy*57)))*ux+(fract(hash(ix+(iy+1)*57))-fract(hash(ix+iy*57)))*uy+(fract(hash(ix+1+(iy+1)*57))-fract(hash(ix+1+iy*57))-fract(hash(ix+(iy+1)*57))+fract(hash(ix+iy*57)))*ux*uy);
}
function fbm(x,y,o=7){let v=0,a=0.5,f=1,m=0;for(let i=0;i<o;i++){v+=n2(x*f,y*f)*a;m+=a;a*=0.5;f*=2.1;}return v/m;}

function mh(x,z){ // Montenegro height field
  const nx=(x+14)/28, nz=(z+14)/28;
  let h=fbm(nx*4+0.5,nz*4+0.5)*11;
  if(z>4)  h+=Math.pow(Math.max(0,(z-4)/10),1.4)*10; // N mountains
  const ld=Math.sqrt((x-2.5)*(x-2.5)+(z+5.5)*(z+5.5));
  if(ld<4.5) h-=(4.5-ld)*1.3; // lake skadar
  if(z<-7) h*=Math.max(0.05,1+(z+7)*0.22); // coast
  const zd=Math.sqrt((x-2)*(x-2)+(z+2)*(z+2));
  if(zd<2.5) h*=0.25; // zeta plain
  const lov=Math.sqrt((x+4)*(x+4)+(z+1.5)*(z+1.5));
  if(lov<3) h+=(3-lov)*0.9; // lovćen
  const ex=Math.max(0,1-Math.abs(x)/13.5);
  const ez=Math.max(0,1-Math.abs(z)/13.5);
  h*=ex*ez;
  return Math.max(0,h);
}

// ── BUILD TERRAIN ────────────────────────────────────────────
const RES=200, SZ=26;
const tGeo = new THREE.PlaneGeometry(SZ*2, SZ*2, RES, RES);
const tPos = tGeo.attributes.position;
const hArr = new Float32Array(tPos.count);

for(let i=0;i<tPos.count;i++){
  const h=mh(tPos.getX(i),tPos.getY(i));
  hArr[i]=h; tPos.setZ(i,h);
}
tGeo.computeVertexNormals();

const cW=new THREE.Color(0x0d2a3a),cL=new THREE.Color(0x2C1A0A),
      cM=new THREE.Color(0x4A3020),cH=new THREE.Color(0x8B7355),cS=new THREE.Color(0xE8E0D0);
const vC=new Float32Array(tPos.count*3);
for(let i=0;i<tPos.count;i++){
  const t=Math.max(0,Math.min(1,hArr[i]/13));
  let c=hArr[i]<0.2?cW.clone():t<0.15?cL.clone().lerp(cM,t/0.15):t<0.55?cM.clone().lerp(cH,(t-0.15)/0.4):cH.clone().lerp(cS,(t-0.55)/0.45);
  vC[i*3]=c.r;vC[i*3+1]=c.g;vC[i*3+2]=c.b;
}
tGeo.setAttribute('color',new THREE.BufferAttribute(vC,3));

const terrain=new THREE.Mesh(tGeo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.9,metalness:0.05}));
terrain.rotation.x=-Math.PI/2; scene.add(terrain);

// Subtle wire
const wire=new THREE.Mesh(tGeo,new THREE.MeshBasicMaterial({color:0xC9A227,wireframe:true,opacity:0.03,transparent:true}));
wire.rotation.x=-Math.PI/2; wire.position.y=0.05; scene.add(wire);

// ── TRIBAL BORDERS + FILLS ────────────────────────────────────
const tribeObjects3d = []; // for raycasting

TRIBES.forEach(tribe=>{
  // Extrude polygon slightly above terrain for fill
  const shape = new THREE.Shape();
  tribe.polygon.forEach(([x,z],i)=>{
    i===0?shape.moveTo(x,-z):shape.lineTo(x,-z); // negate z because shape Y → world -Z after rotation
  });
  shape.closePath();

  // Fill
  const fillG = new THREE.ShapeGeometry(shape);
  const fillM = new THREE.MeshBasicMaterial({
    color: tribe.color, transparent:true, opacity:0.12,
    side:THREE.DoubleSide, depthWrite:false
  });
  const fill = new THREE.Mesh(fillG,fillM);
  fill.rotation.x=-Math.PI/2; fill.position.y=1.8;
  fill.userData={tribe, isFill:true};
  scene.add(fill); tribeObjects3d.push(fill);

  // Border line (follows terrain)
  const borderPts=[];
  const pts=[...tribe.polygon, tribe.polygon[0]];
  for(let i=0;i<pts.length-1;i++){
    const [x0,z0]=pts[i],[x1,z1]=pts[i+1];
    const segs=12;
    for(let s=0;s<=segs;s++){
      const t=s/segs, xi=x0+(x1-x0)*t, zi=z0+(z1-z0)*t;
      borderPts.push(new THREE.Vector3(xi, mh(xi,zi)+2.0, zi));
    }
  }
  const borderG=new THREE.BufferGeometry().setFromPoints(borderPts);
  const borderM=new THREE.LineBasicMaterial({color:tribe.color, opacity:0.7, transparent:true});
  scene.add(new THREE.Line(borderG,borderM));

  // Center click sphere (invisible, just for raycasting)
  const [cx,cz]=tribe.center;
  const cy=mh(cx,cz)+1.5;
  const clickS=new THREE.Mesh(
    new THREE.SphereGeometry(1.8,8,8),
    new THREE.MeshBasicMaterial({visible:false})
  );
  clickS.position.set(cx,cy,cz);
  clickS.userData={tribe};
  scene.add(clickS); tribeObjects3d.push(clickS);

  // Glow dot at center
  const dotS=new THREE.Mesh(
    new THREE.SphereGeometry(0.28,12,12),
    new THREE.MeshStandardMaterial({color:tribe.color,emissive:tribe.color,emissiveIntensity:2,roughness:0.2})
  );
  dotS.position.set(cx,cy+0.2,cz);
  scene.add(dotS);
  tribe._dot=dotS;

  // Ring
  const ringG=new THREE.RingGeometry(0.45,0.6,32);
  const ringM=new THREE.MeshBasicMaterial({color:tribe.color,side:THREE.DoubleSide,transparent:true,opacity:0.6});
  const ring=new THREE.Mesh(ringG,ringM);
  ring.position.set(cx,cy+0.1,cz); ring.rotation.x=-Math.PI/2;
  scene.add(ring);
  tribe._fill=fill; tribe._fillMat=fillM;
});

// ── POI MARKERS ──────────────────────────────────────────────
const poiMarkers=[];
TRIBES.forEach(tribe=>{
  tribe.places.forEach((p,i)=>{
    const [px,pz]=p.pos;
    const py=mh(px,pz)+1.2;
    const m=new THREE.Mesh(
      new THREE.SphereGeometry(0.18,8,8),
      new THREE.MeshStandardMaterial({color:tribe.color,emissive:tribe.color,emissiveIntensity:1.5,roughness:0.2})
    );
    m.position.set(px,py,pz);
    m.userData={tribe,poi:p,idx:i};
    m.visible=false;
    scene.add(m); poiMarkers.push(m);
  });
});

// ── RAYCASTING ────────────────────────────────────────────────
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let selectedTribe=null;

renderer.domElement.addEventListener('click',e=>{
  if(selectedTribe) return; // don't reselect while panel open
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(tribeObjects3d);
  if(hits.length) selectTribe(hits[0].object.userData.tribe);
});

renderer.domElement.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(tribeObjects3d);
  renderer.domElement.style.cursor=hits.length?'pointer':'grab';
});

// ── HTML LABELS ───────────────────────────────────────────────
function renderLabels(){
  const layer=document.getElementById('labels');
  layer.innerHTML='';
  TRIBES.forEach(tribe=>{
    if(activeFilter!=='all'&&tribe.region!==activeFilter) return;
    const [cx,cz]=tribe.center;
    const cy=mh(cx,cz)+2.5;
    const v=new THREE.Vector3(cx,cy,cz).project(camera);
    if(v.z>1) return;
    const x=(v.x*0.5+0.5)*innerWidth;
    const y=(-v.y*0.5+0.5)*innerHeight;
    const el=document.createElement('div');
    el.className='tlabel';
    el.style.left=x+'px'; el.style.top=y+'px';
    el.style.color=tribe.color;
    el.innerHTML=`<div class="tdot" style="background:${tribe.color}"></div><div class="tname">${tribe.name}</div>`;
    el.addEventListener('click',()=>selectTribe(tribe));
    layer.appendChild(el);
  });
}

// ── FILTER ────────────────────────────────────────────────────
let activeFilter='all';
document.querySelectorAll('.fpill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter=btn.dataset.f;
    tribeObjects3d.forEach(o=>{
      const t=o.userData.tribe;
      o.visible=(activeFilter==='all'||t.region===activeFilter);
    });
  });
});

// ── CAMERA LERP STATE ─────────────────────────────────────────
const camTgt={pos:new THREE.Vector3(0,32,52),look:new THREE.Vector3(0,0,0)};
let camLerping=false;

function lerpCamera(pos,look){
  camTgt.pos.copy(pos); camTgt.look.copy(look);
  camLerping=true;
}

// ── SELECT TRIBE ──────────────────────────────────────────────
function selectTribe(tribe){
  if(!tribe) return;
  selectedTribe=tribe;
  controls.autoRotate=false;

  // Highlight fill
  TRIBES.forEach(t=>{ if(t._fillMat){ t._fillMat.opacity=t===tribe?0.28:0.05; }});

  // Show POI markers for this tribe
  poiMarkers.forEach(m=>{ m.visible=m.userData.tribe===tribe; });

  // Camera: zoom into tribe center, from slight angle
  const [cx,cz]=tribe.center;
  const cy=mh(cx,cz);
  lerpCamera(
    new THREE.Vector3(cx-2, cy+18, cz+22),
    new THREE.Vector3(cx, cy, cz)
  );

  // Build sheet
  document.getElementById('s-region').textContent=tribe.regionLabel;
  document.getElementById('s-region').style.color=tribe.color;
  document.getElementById('s-title').textContent=tribe.name;
  document.getElementById('s-meta').textContent=`Est. ${tribe.founded}  ·  ${tribe.descendants} descendants  ·  Capital: ${tribe.center}`;
  document.getElementById('sheet-strip').style.background=
    `repeating-linear-gradient(90deg,${tribe.color} 0,${tribe.color} 12px,#B01020 12px,#B01020 24px,${tribe.color} 24px,${tribe.color} 36px,rgba(0,0,0,0.2) 36px,rgba(0,0,0,0.2) 48px)`;

  const body=document.getElementById('s-body');
  body.innerHTML=`
    <p class="sheet-summary">${tribe.summary}</p>
    <div class="sheet-quote">${tribe.motto}</div>
    ${tribe.places.map((p,i)=>`
      <div class="poi-card" data-tribe="${tribe.id}" data-poi="${i}" data-px="${p.pos[0]}" data-pz="${p.pos[1]}">
        <div class="poi-icon">${p.ico}</div>
        <div class="poi-content">
          <div class="poi-name">${p.name}</div>
          <div class="poi-desc">${p.desc}</div>
          <span class="poi-coords">${p.pos[0].toFixed(1)}°E · ${p.pos[1].toFixed(1)}°N</span>
        </div>
      </div>
    `).join('')}
  `;

  document.getElementById('sheet').classList.add('open');
  document.getElementById('back-btn').classList.add('visible');
  document.getElementById('hint').style.opacity='0';

  // Observe POI cards for scroll-based camera focus
  setTimeout(setupPoiObserver,200);
}

// ── POI SCROLL OBSERVER ───────────────────────────────────────
let poiObserver=null;
function setupPoiObserver(){
  if(poiObserver) poiObserver.disconnect();
  const body=document.getElementById('s-body');
  poiObserver=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting) return;
      e.target.classList.add('focused');
      const px=parseFloat(e.target.dataset.px);
      const pz=parseFloat(e.target.dataset.pz);
      const py=mh(px,pz);
      // Camera swings to POI from low angle — shows topography dramatically
      lerpCamera(
        new THREE.Vector3(px+4, py+10, pz+12),
        new THREE.Vector3(px, py, pz)
      );
    });
    // Unfocus others
    document.querySelectorAll('.poi-card').forEach(c=>{
      const hit=entries.find(e=>e.target===c&&e.isIntersecting);
      if(!hit) c.classList.remove('focused');
    });
  },{root:body, threshold:0.55});

  document.querySelectorAll('.poi-card').forEach(c=>poiObserver.observe(c));
}

// ── CLOSE / BACK ──────────────────────────────────────────────
function closePanel(){
  selectedTribe=null;
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('hint').style.opacity='1';
  TRIBES.forEach(t=>{ if(t._fillMat) t._fillMat.opacity=0.12; });
  poiMarkers.forEach(m=>m.visible=false);
  if(poiObserver) poiObserver.disconnect();
  controls.autoRotate=true;
  lerpCamera(new THREE.Vector3(0,32,52), new THREE.Vector3(0,0,0));
}

document.getElementById('sheet-close').addEventListener('click',closePanel);
document.getElementById('back-btn').addEventListener('click',closePanel);

// ── RESIZE ────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── ANIMATE ───────────────────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  // Camera lerp
  if(camLerping){
    camera.position.lerp(camTgt.pos,0.05);
    controls.target.lerp(camTgt.look,0.05);
    if(camera.position.distanceTo(camTgt.pos)<0.1) camLerping=false;
  }

  // Pulse tribe markers
  TRIBES.forEach((tribe,i)=>{
    if(tribe._dot){
      const p=1+Math.sin(t*1.6+i*0.9)*0.3;
      tribe._dot.material.emissiveIntensity=selectedTribe===tribe?3*p:p;
      tribe._dot.scale.setScalar(selectedTribe===tribe?1.6*p:p*0.8);
    }
  });

  poiMarkers.forEach((m,i)=>{
    m.material.emissiveIntensity=1+Math.sin(t*2+i*0.5)*0.5;
  });

  terrain.position.y=Math.sin(t*0.2)*0.06;
  wire.position.y=terrain.position.y+0.04;
  sun.intensity=5+Math.sin(t*0.3)*0.5;

  renderLabels();
  controls.update();
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
