<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plemena Crne Gore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --crimson:#B01020; --gold:#C9A227; --gold2:#E8C84A;
      --cream:#F0E5CC; --dark:#0B0705; --glass:rgba(10,6,4,0.88); --muted:#7A6858;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);}

    #c{position:fixed;inset:0;display:block;z-index:0;}

    #hud{
      position:fixed;top:0;left:0;right:0;z-index:50;
      padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
      background:linear-gradient(to bottom,rgba(11,7,5,.96) 60%,transparent);
      pointer-events:none;
    }
    .hud-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
    .hud-title span{color:var(--crimson);}
    .hud-hint{font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:opacity .4s;}

    #filters{
      position:fixed;top:54px;left:50%;transform:translateX(-50%);
      z-index:50;display:flex;gap:6px;pointer-events:auto;
    }
    .fp{
      background:rgba(10,6,4,.82);border:1px solid rgba(201,162,39,.22);
      color:var(--muted);padding:5px 16px;border-radius:999px;
      font-size:.68rem;letter-spacing:1.2px;text-transform:uppercase;
      cursor:pointer;transition:all .2s;white-space:nowrap;
    }
    .fp:hover,.fp.on{border-color:var(--gold);color:var(--gold);background:rgba(201,162,39,.1);}

    .tlabel{
      position:fixed;transform:translate(-50%,-100%);
      text-align:center;pointer-events:auto;cursor:pointer;
      transition:opacity .3s;z-index:30;
    }
    .tdot{width:8px;height:8px;border-radius:50%;margin:0 auto 3px;box-shadow:0 0 8px currentColor;transition:transform .2s;}
    .tname{font-size:.55rem;letter-spacing:1.2px;text-transform:uppercase;font-weight:500;opacity:.75;white-space:nowrap;}
    .tlabel:hover .tdot{transform:scale(1.8);}
    .tlabel:hover .tname{opacity:1;}

    #sheet{
      position:fixed;bottom:0;left:0;right:0;z-index:60;
      height:58vh;transform:translateY(100%);
      transition:transform .5s cubic-bezier(.4,0,.2,1);
      display:flex;flex-direction:column;
      background:var(--glass);backdrop-filter:blur(24px);
      border-top:1px solid rgba(201,162,39,.2);border-radius:20px 20px 0 0;
    }
    #sheet.open{transform:translateY(0);}

    .sstrip{
      height:5px;flex-shrink:0;border-radius:20px 20px 0 0;
      background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 12px,var(--crimson) 12px,var(--crimson) 24px,var(--gold) 24px,var(--gold) 36px,rgba(201,162,39,.1) 36px,rgba(201,162,39,.1) 48px);
    }
    .shead{
      flex-shrink:0;padding:14px 28px 10px;
      display:flex;align-items:flex-start;justify-content:space-between;
      border-bottom:1px solid rgba(201,162,39,.1);
    }
    .sreg{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px;}
    .stitle{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:#fff;line-height:1;}
    .smeta{font-size:.72rem;color:var(--muted);margin-top:4px;}
    #sc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--muted);
        width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.75rem;flex-shrink:0;margin-left:12px;transition:all .15s;}
    #sc:hover{color:#fff;}

    .sbody{
      flex:1;overflow-y:auto;padding:0 28px 40px;
      display:flex;flex-direction:column;gap:0;scroll-behavior:smooth;
    }
    .sbody::-webkit-scrollbar{width:3px;}
    .sbody::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}

    .ssum{padding:16px 0;font-size:.88rem;line-height:1.75;color:#8a7a6a;border-bottom:1px solid rgba(255,255,255,.05);}
    .squote{margin:16px 0;border-left:3px solid var(--crimson);padding:10px 16px;background:rgba(176,16,32,.06);border-radius:0 8px 8px 0;font-style:italic;color:#8a7a6a;font-size:.85rem;line-height:1.6;}

    .pcard{
      padding:20px 0;border-bottom:1px solid rgba(255,255,255,.05);
      display:flex;gap:16px;align-items:flex-start;
      transition:opacity .4s,border-left .3s;
      opacity:.45;border-left:3px solid transparent;padding-left:12px;
    }
    .pcard.focused{opacity:1;border-left-color:var(--gold);}
    .pico{font-size:1.8rem;flex-shrink:0;margin-top:2px;filter:drop-shadow(0 0 8px rgba(201,162,39,.4));}
    .pname{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:4px;}
    .pdesc{font-size:.82rem;line-height:1.65;color:#7a6a5a;}
    .pcoords{display:inline-block;margin-top:6px;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--gold);opacity:.6;}

    #backbtn{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:40;
      background:rgba(10,6,4,.85);border:1px solid rgba(201,162,39,.3);
      color:var(--gold);font-size:.68rem;letter-spacing:2px;text-transform:uppercase;
      padding:8px 20px;border-radius:999px;cursor:pointer;
      opacity:0;pointer-events:none;transition:opacity .3s;
    }
    #backbtn.vis{opacity:1;pointer-events:auto;}

    #labels{position:fixed;inset:0;z-index:30;pointer-events:none;}
    #labels .tlabel{pointer-events:auto;}

    #err{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
         background:rgba(176,16,32,.9);color:#fff;padding:20px 30px;border-radius:12px;
         font-size:.9rem;max-width:500px;z-index:999;display:none;}
  </style>
</head>
<body>

  <div class="hud-title">Plemena <span>Crne Gore</span></div>
  <div class="hud-hint" id="hint">Click a tribe to explore</div>

  <button class="fp" data-f="brda">Brda</button>
  <button class="fp" data-f="herc">Hercegovina</button>
  <button class="fp" data-f="coast">Primorje</button>
</div>
<div id="labels"></div>
<div id="sheet">
  <div class="sstrip" id="sstrip"></div>
  <div class="shead">
    <div><div class="sreg" id="sreg"></div><div class="stitle" id="stitle"></div><div class="smeta" id="smeta"></div></div>
    <button id="sc">✕</button>

  <div class="sbody" id="sbody"></div>

<button id="backbtn">← Full Map</button>
<div id="err"></div>

// ── TERRAIN MATH ──────────────────────────────────────────────
function hash(n) { return Math.sin(n * 127.1) * 43758.5453; }

function noise2(x, y) {

  if (lov < 3) h += (3 - lov) * 0.9;
  const ex = Math.max(0, 1 - Math.abs(x) / 13.5);
  const ez = Math.max(0, 1 - Math.abs(z) / 13.5);
  return Math.max(0, h * ex * ez);
}

// ── BUILD TERRAIN ─────────────────────────────────────────────
const RES = 160, SZ = 26;
const tGeo = new THREE.PlaneGeometry(SZ * 2, SZ * 2, RES, RES);
const tPos = tGeo.attributes.position;
const hArr = new Float32Array(tPos.count);

for (let i = 0; i < tPos.count; i++) {
  const h = mh(tPos.getX(i), tPos.getY(i));
  hArr[i] = h;
  tPos.setZ(i, h);
}
tGeo.computeVertexNormals();

// Vertex colours by elevation
const colWater = new THREE.Color(0x0d2a3a);
const colLow   = new THREE.Color(0x3C2A18);
const colMid   = new THREE.Color(0x5A4030);
const colHigh  = new THREE.Color(0x9B7B55);
const colSnow  = new THREE.Color(0xE8E0D0);
const vColors  = new Float32Array(tPos.count * 3);

for (let i = 0; i < tPos.count; i++) {
  const t = Math.max(0, Math.min(1, hArr[i] / 13));
  let col;
  if (hArr[i] < 0.2) col = colWater.clone();
  else if (t < 0.15) col = colLow.clone().lerp(colMid, t / 0.15);
  else if (t < 0.55) col = colMid.clone().lerp(colHigh, (t - 0.15) / 0.4);
  else               col = colHigh.clone().lerp(colSnow, (t - 0.55) / 0.45);
  vColors[i * 3]     = col.r;
  vColors[i * 3 + 1] = col.g;
  vColors[i * 3 + 2] = col.b;
}
tGeo.setAttribute('color', new THREE.BufferAttribute(vColors, 3));

const terrain = new THREE.Mesh(tGeo, new THREE.MeshStandardMaterial({
  vertexColors: true, roughness: 0.85, metalness: 0.05
}));
terrain.rotation.x = -Math.PI / 2;
scene.add(terrain);

// Wireframe overlay
const wireMesh = new THREE.Mesh(tGeo, new THREE.MeshBasicMaterial({
  color: 0xC9A227, wireframe: true, opacity: 0.04, transparent: true
}));
wireMesh.rotation.x = -Math.PI / 2;
wireMesh.position.y = 0.05;
scene.add(wireMesh);

// ── TRIBAL FILLS + BORDERS ────────────────────────────────────
const clickTargets = [];

TRIBES.forEach(tribe => {
  // Shape (note: ShapeGeometry is in XY plane; after rotation.x=-PI/2, shape Y → world -Z)
  const shape = new THREE.Shape();
  tribe.polygon.forEach(([x, z], i) => {
    if (i === 0) shape.moveTo(x, -z);
    else shape.lineTo(x, -z);
  });
  shape.closePath();

  // Transparent fill
  const fillGeo = new THREE.ShapeGeometry(shape);
  const fillMat = new THREE.MeshBasicMaterial({
    color: tribe.color, transparent: true, opacity: 0.12,
    side: THREE.DoubleSide, depthWrite: false
  });
  const fill = new THREE.Mesh(fillGeo, fillMat);
  fill.rotation.x = -Math.PI / 2;
  fill.position.y = 1.8;
  fill.userData = { tribe };
  scene.add(fill);
  tribe._fill = fill;
  tribe._fillMat = fillMat;
  clickTargets.push(fill);

  // Border line following terrain
  const bPts = [];
  const poly = [...tribe.polygon, tribe.polygon[0]];
  for (let i = 0; i < poly.length - 1; i++) {
    const [x0, z0] = poly[i], [x1, z1] = poly[i + 1];
    for (let s = 0; s <= 10; s++) {
      const t = s / 10;
      const xi = x0 + (x1 - x0) * t;
      const zi = z0 + (z1 - z0) * t;
      bPts.push(new THREE.Vector3(xi, mh(xi, zi) + 2.0, zi));
    }
  }
  const borderLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(bPts),
    new THREE.LineBasicMaterial({ color: tribe.color, opacity: 0.75, transparent: true })
  );
  scene.add(borderLine);
  tribe._border = borderLine;

  // Invisible click sphere at center
  const [cx, cz] = tribe.center;
  const clickSphere = new THREE.Mesh(
    new THREE.SphereGeometry(2, 8, 8),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  clickSphere.position.set(cx, mh(cx, cz) + 1.5, cz);
  clickSphere.userData = { tribe };
  scene.add(clickSphere);
  clickTargets.push(clickSphere);

  // Glow dot
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 12, 12),
    new THREE.MeshStandardMaterial({ color: tribe.color, emissive: tribe.color, emissiveIntensity: 2, roughness: 0.2 })
  );
  dot.position.set(cx, mh(cx, cz) + 0.5, cz);
  scene.add(dot);
  tribe._dot = dot;

  // Ring
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.5, 0.65, 32),
    new THREE.MeshBasicMaterial({ color: tribe.color, side: THREE.DoubleSide, transparent: true, opacity: 0.55 })
  );
  ring.position.set(cx, mh(cx, cz) + 0.1, cz);
  ring.rotation.x = -Math.PI / 2;
  scene.add(ring);
});

// ── POI MARKERS ───────────────────────────────────────────────
const poiMarkers = [];
TRIBES.forEach(tribe => {
  tribe.places.forEach((p) => {
    const [px, pz] = p.pos;
    const marker = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 8, 8),
      new THREE.MeshStandardMaterial({ color: tribe.color, emissive: tribe.color, emissiveIntensity: 1.8, roughness: 0.2 })
    );
    marker.position.set(px, mh(px, pz) + 0.8, pz);
    marker.visible = false;
    scene.add(marker);
    poiMarkers.push({ mesh: marker, tribe, poi: p });
  });
});

// ── RAYCASTING ────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedTribe = null;

renderer.domElement.addEventListener('click', e => {
  if (selectedTribe) return;
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickTargets);
  if (hits.length) selectTribe(hits[0].object.userData.tribe);
});

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickTargets);
  renderer.domElement.style.cursor = hits.length ? 'pointer' : 'grab';
});

// ── LABELS ────────────────────────────────────────────────────
let activeFilter = 'all';
function renderLabels() {
  const layer = document.getElementById('labels');
  layer.innerHTML = '';
  TRIBES.forEach(tribe => {
    if (activeFilter !== 'all' && tribe.region !== activeFilter) return;
    const [cx, cz] = tribe.center;
    const cy = mh(cx, cz) + 2.8;
    const v = new THREE.Vector3(cx, cy, cz).project(camera);
    if (v.z >= 1) return;
    const x = (v.x * 0.5 + 0.5) * innerWidth;
    const y = (-v.y * 0.5 + 0.5) * innerHeight;
    const el = document.createElement('div');
    el.className = 'tlabel';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.color = tribe.color;
    el.innerHTML = `<div class="tdot" style="background:${tribe.color}"></div><div class="tname">${tribe.name}</div>`;
    el.addEventListener('click', () => selectTribe(tribe));
    layer.appendChild(el);
  });
}

// ── CAMERA LERP ───────────────────────────────────────────────
const camTarget = { pos: new THREE.Vector3(0, 32, 52), look: new THREE.Vector3(0, 0, 0) };
let camLerping = false;
function moveCamera(pos, look) {
  camTarget.pos.copy(pos);
  camTarget.look.copy(look);
  camLerping = true;
}

// ── TRIBE SELECTION ───────────────────────────────────────────
function selectTribe(tribe) {
  if (!tribe) return;
  selectedTribe = tribe;
  controls.autoRotate = false;

  // Highlight fills
  TRIBES.forEach(t => { if (t._fillMat) t._fillMat.opacity = t === tribe ? 0.3 : 0.04; });

  // Show POI markers
  poiMarkers.forEach(m => { m.mesh.visible = m.tribe === tribe; });

  // Zoom camera
  const [cx, cz] = tribe.center;
  const cy = mh(cx, cz);
  moveCamera(
    new THREE.Vector3(cx - 2, cy + 18, cz + 22),
    new THREE.Vector3(cx, cy, cz)
  );

  // Populate sheet
  document.getElementById('sreg').textContent = tribe.regionLabel;
  document.getElementById('sreg').style.color = tribe.color;
  document.getElementById('stitle').textContent = tribe.name;
  document.getElementById('smeta').textContent = `Est. ${tribe.founded}  ·  ${tribe.descendants} descendants`;
  document.getElementById('sstrip').style.background =
    `repeating-linear-gradient(90deg,${tribe.color} 0,${tribe.color} 12px,#B01020 12px,#B01020 24px,${tribe.color} 24px,${tribe.color} 36px,rgba(0,0,0,0.2) 36px,rgba(0,0,0,0.2) 48px)`;

  const body = document.getElementById('sbody');
  body.innerHTML = `
    <p class="ssum">${tribe.summary}</p>
    <div class="squote">${tribe.motto}</div>
    ${tribe.places.map((p, i) => `
      <div class="pcard" data-px="${p.pos[0]}" data-pz="${p.pos[1]}">
        <div class="pico">${p.ico}</div>
        <div>
          <div class="pname">${p.name}</div>
          <div class="pdesc">${p.desc}</div>
          <span class="pcoords">Coord ${p.pos[0].toFixed(1)}, ${p.pos[1].toFixed(1)}</span>
        </div>
      </div>
    `).join('')}
  `;

  document.getElementById('sheet').classList.add('open');
  document.getElementById('backbtn').classList.add('vis');
  document.getElementById('hint').style.opacity = '0';

  setTimeout(setupPoiScroll, 250);
}

// ── POI SCROLL OBSERVER ───────────────────────────────────────
let poiObs = null;
function setupPoiScroll() {
  if (poiObs) poiObs.disconnect();
  const body = document.getElementById('sbody');
  const cards = body.querySelectorAll('.pcard');
  poiObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) { e.target.classList.remove('focused'); return; }
      e.target.classList.add('focused');
      const px = parseFloat(e.target.dataset.px);
      const pz = parseFloat(e.target.dataset.pz);
      const py = mh(px, pz);
      moveCamera(
        new THREE.Vector3(px + 3, py + 10, pz + 12),
        new THREE.Vector3(px, py, pz)
      );
    });
  }, { root: body, threshold: 0.6 });
  cards.forEach(c => poiObs.observe(c));
}

// ── CLOSE ─────────────────────────────────────────────────────
function closePanel() {
  selectedTribe = null;
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backbtn').classList.remove('vis');
  document.getElementById('hint').style.opacity = '1';
  TRIBES.forEach(t => { if (t._fillMat) t._fillMat.opacity = 0.12; });
  poiMarkers.forEach(m => m.mesh.visible = false);
  if (poiObs) poiObs.disconnect();
  controls.autoRotate = true;
  moveCamera(new THREE.Vector3(0, 32, 52), new THREE.Vector3(0, 0, 0));
}

document.getElementById('sc').addEventListener('click', closePanel);
document.getElementById('backbtn').addEventListener('click', closePanel);

// ── FILTERS ───────────────────────────────────────────────────
document.querySelectorAll('.fp').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fp').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter = btn.dataset.f;
  });
});

// ── RESIZE ────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── ANIMATE ───────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth camera lerp
  if (camLerping) {
    camera.position.lerp(camTarget.pos, 0.05);
    controls.target.lerp(camTarget.look, 0.05);
    if (camera.position.distanceTo(camTarget.pos) < 0.15) camLerping = false;
  }

  // Pulse tribe markers
  TRIBES.forEach((tribe, i) => {
    if (tribe._dot) {
      const pulse = 1 + Math.sin(t * 1.6 + i * 0.9) * 0.3;
      tribe._dot.material.emissiveIntensity = selectedTribe === tribe ? 3 * pulse : pulse;
      tribe._dot.scale.setScalar(selectedTribe === tribe ? 1.5 * pulse : 0.9 * pulse);
    }
  });

  // Pulse POI markers
  poiMarkers.forEach((pm, i) => {
    pm.mesh.material.emissiveIntensity = 1.5 + Math.sin(t * 2 + i * 0.5) * 0.6;
  });

  terrain.position.y = Math.sin(t * 0.2) * 0.06;
  wireMesh.position.y = terrain.position.y + 0.04;
  sunLight.intensity = 6 + Math.sin(t * 0.3) * 0.5;

  renderLabels();
  controls.update();
  renderer.render(scene, camera);
}

animate();

} catch(e) {
  showErr(e.message + '\n' + (e.stack || '').split('\n').slice(0,3).join('\n'));
}
</script>
</body>
</html>
