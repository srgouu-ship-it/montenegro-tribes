<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vječna Planina — Daily 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #C9A227;
            --text: #F0E5CC;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }
        
        #c { position: fixed; inset: 0; z-index: 1; }

        #ui {
            position: fixed; inset: 0; z-index: 10;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
            padding: 40px;
        }

        header { display: flex; justify-content: space-between; align-items: flex-start; }
        .title { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); }
        .date-label { font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; margin-top: 4px; }

        .wisdom-box {
            max-width: 400px; opacity: 0; transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: auto; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px); padding: 30px; border-left: 2px solid var(--accent);
        }
        .wisdom-box.show { opacity: 1; transform: translateY(0); }
        .quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; line-height: 1.6; margin-bottom: 15px; }
        .author { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }

        footer { display: flex; justify-content: space-between; align-items: flex-end; font-size: 0.6rem; letter-spacing: 1px; opacity: 0.4; }

        #loading {
            position: fixed; inset: 0; z-index: 100; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s;
        }
        .spinner { width: 30px; height: 30px; border: 2px solid rgba(201,162,39,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #overlay-btn {
            pointer-events: auto; background: none; border: 1px solid var(--accent); color: var(--accent);
            padding: 10px 20px; border-radius: 999px; font-size: 0.6rem; cursor: pointer; transition: all 0.3s;
        }
        #overlay-btn:hover { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div style="letter-spacing: 5px; font-size: 10px;">GENERATING TODAY'S PEAK</div>
</div>

<canvas id="c"></canvas>

<div id="ui">
    <header>
        <div>
            <div class="title">Vječna Planina</div>
            <div class="date-label" id="current-date">-- -- ----</div>
        </div>
        <button id="overlay-btn">OBSERVE</button>
    </header>

    <div class="wisdom-box" id="wisdom">
        <div class="quote" id="quote-text">"U dobru je lako dobro biti, na muci se poznaju junaci."</div>
        <div class="author" id="quote-author">Petar II Petrović Njegoš</div>
    </div>

    <footer>
        <div>INTERACT: DRAG TO ORBIT • SCROLL TO ZOOM</div>
        <div id="status-tag">STATUS: ETERNAL</div>
    </footer>
</div>

<script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    // --- DAILY DATA ---
    const WISDOM_POOL = [
        { q: "U dobru je lako dobro biti, na muci se poznaju junaci.", a: "Petar II Petrović Njegoš" },
        { q: "Tvrd je orah voćka čudnovata, ne polomi ga, al' zube polomi!", a: "Gorski Vijenac" },
        { q: "Ko na brdo, ak' i malo, stoji više vidi no onaj pod brdom.", a: "P. P. Njegoš" },
        { q: "Blago tome ko dovijek živi, imao se rašta i roditi.", a: "P. P. Njegoš" },
        { q: "Čašu meda jošt niko ne popi, što je čašom žuči ne zagrči.", a: "P. P. Njegoš" }
    ];

    const today = new Date();
    const dateStr = today.toDateString();
    document.getElementById('current-date').textContent = dateStr.toUpperCase();
    
    // Simple seed based on date
    const seed = dateStr.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
    const random = () => {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    };

    // --- SCENE SETUP ---
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;

    const scene = new THREE.Scene();
    
    // Theme based on day of week
    const themes = [
        { bg: 0x050508, fog: 0x050508, mount: 0x223344, accent: 0x4488ff }, // Sun
        { bg: 0x080505, fog: 0x080505, mount: 0x332222, accent: 0xff4444 }, // Mon
        { bg: 0x050805, fog: 0x050805, mount: 0x223322, accent: 0x44ff88 }, // Tue
        { bg: 0x070707, fog: 0x070707, mount: 0x2a2a2a, accent: 0xC9A227 }, // Wed
        { bg: 0x050708, fog: 0x050708, mount: 0x222a33, accent: 0x00d4ff }, // Thu
        { bg: 0x080507, fog: 0x080507, mount: 0x33222a, accent: 0xff00d4 }, // Fri
        { bg: 0x080705, fog: 0x080705, mount: 0x332a22, accent: 0xffaa00 }  // Sat
    ];
    const theme = themes[today.getDay()];
    scene.background = new THREE.Color(theme.bg);
    scene.fog = new THREE.FogExp2(theme.fog, 0.02);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(40, 30, 40);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.maxPolarAngle = Math.PI / 2;

    // --- LIGHTS ---
    const ambient = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    const pointLight = new THREE.PointLight(theme.accent, 5, 50);
    pointLight.position.set(0, 15, 0);
    scene.add(pointLight);

    // --- TERRAIN GENERATION ---
    const geometry = new THREE.PlaneGeometry(60, 60, 64, 64);
    const pos = geometry.attributes.position;

    // Displacement
    for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const dist = Math.sqrt(x*x + y*y);
        
        // Use seed in sine waves for unique daily shape
        let h = Math.sin(x * 0.1 + seed * 0.1) * Math.cos(y * 0.1 + seed * 0.2) * 5;
        h += Math.sin(x * 0.3) * Math.sin(y * 0.4) * 2;
        
        // Create the peak
        const peak = Math.max(0, 20 - dist * 0.8);
        h += peak;

        pos.setZ(i, h);
    }
    geometry.computeVertexNormals();

    const material = new THREE.MeshStandardMaterial({
        color: theme.mount,
        flatShading: true,
        roughness: 0.9,
        metalness: 0.1
    });

    const mountain = new THREE.Mesh(geometry, material);
    mountain.rotation.x = -Math.PI / 2;
    scene.add(mountain);

    // --- TOTEM ---
    const totemGeo = new THREE.OctahedronGeometry(1.5);
    const totemMat = new THREE.MeshStandardMaterial({
        color: theme.accent,
        emissive: theme.accent,
        emissiveIntensity: 2,
        transparent: true,
        opacity: 0.8
    });
    const totem = new THREE.Mesh(totemGeo, totemMat);
    totem.position.y = 18;
    scene.add(totem);

    // --- INTERACTION ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let wisdomShown = false;

    const onSelect = (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(totem);
        
        if (hits.length > 0) {
            const box = document.getElementById('wisdom');
            const quote = WISDOM_POOL[Math.floor(random() * WISDOM_POOL.length)];
            document.getElementById('quote-text').textContent = `"${quote.q}"`;
            document.getElementById('quote-author').textContent = quote.a;
            box.classList.toggle('show');
            wisdomShown = !wisdomShown;
            
            // Pulse the totem
            totem.scale.setScalar(1.5);
        }
    };

    window.addEventListener('mousedown', onSelect);
    document.getElementById('overlay-btn').onclick = () => {
        controls.autoRotate = !controls.autoRotate;
        document.getElementById('overlay-btn').textContent = controls.autoRotate ? 'OBSERVE' : 'FREE LOOK';
    };

    // --- ANIMATION LOOP ---
    let frame = 0;
    function animate() {
        requestAnimationFrame(animate);
        frame++;
        
        const time = Date.now() * 0.001;
        
        // Floating totem
        totem.position.y = 18 + Math.sin(time) * 0.5;
        totem.rotation.y += 0.01;
        totem.scale.lerp(new THREE.Vector3(1,1,1), 0.1);

        // Rotating point light
        pointLight.position.x = Math.sin(time * 0.5) * 20;
        pointLight.position.z = Math.cos(time * 0.5) * 20;

        controls.update();
        renderer.render(scene, camera);

        if (frame === 10) {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 1000);
        }
    }

    animate();

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
