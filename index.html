<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plemena Crne Gore — Tribes of Montenegro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --crimson:#B01020; --gold:#C9A227; --gold2:#E8C84A;
      --cream:#F0E5CC; --dark:#0B0705; --glass:rgba(10,6,4,0.95); --muted:#7A6858;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{ width:100%; height:100%; background:var(--dark); }
    body{ width:100%; height:100%; overflow:hidden; background:transparent; font-family:'Inter',sans-serif; color:var(--cream); }

    #c{position:fixed;inset:0;display:block;z-index:1;}

    #hud{
      position:fixed;top:0;left:0;right:0;z-index:100;
      padding:20px 28px;display:flex;align-items:center;justify-content:space-between;
      background:linear-gradient(to bottom,rgba(11,7,5,.9) 20%,transparent);
      pointer-events:none;
    }
    .hud-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
    .hud-title span{color:var(--crimson);}

    #labels{position:fixed;inset:0;z-index:80;pointer-events:none;}
    .tlabel{
      position:absolute; transform:translate(-50%,-100%);
      text-align:center; pointer-events:auto; cursor:pointer;
    }
    .tdot{width:12px; height:12px; border-radius:50%; margin:0 auto 6px; box-shadow:0 0 12px currentColor; border:2px solid #fff;}
    .tname{font-size:.65rem; letter-spacing:1.8px; text-transform:uppercase; font-weight:700; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,0.8);}

    #sheet{
      position:fixed;bottom:0;left:0;right:0;z-index:120;
      height:58vh;transform:translateY(100%);
      transition:transform .5s cubic-bezier(0.19,1,0.22,1);
      display:flex;flex-direction:column;
      background:var(--glass);backdrop-filter:blur(40px);
      border-top:1px solid rgba(201,162,39,.3);
    }
    #sheet.open{transform:translateY(0); box-shadow: 0 -20px 80px rgba(0,0,0,0.9); }

    .shead{
      flex-shrink:0;padding:24px 32px 12px;
      display:flex;align-items:flex-start;justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .stitle{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:#fff;line-height:1;}
    #sc{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;
        width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:1rem;flex-shrink:0;}

    .sbody{ flex:1; overflow-y:auto; padding:0 32px 60px; scroll-behavior:smooth; }
    .ssum{padding:24px 0;font-size:1rem;line-height:1.8;color:#d0c0b0;}

    .pcard{
      padding:28px 0;border-bottom:1px solid rgba(255,255,255,.05);
      display:flex;gap:24px;align-items:flex-start;
      transition:all .4s; opacity:.3; transform: scale(0.98);
    }
    .pcard.focused{opacity:1; transform: scale(1.05) translateX(10px); }
    .pico{font-size:2.5rem;flex-shrink:0;filter:drop-shadow(0 0 15px rgba(201,162,39,.4));}
    .pname{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:8px;}
    .pdesc{font-size:.95rem;line-height:1.7;color:#b0a090;}

    #backbtn{
      position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:110;
      background:var(--crimson); border:none; color:#fff; font-size:.75rem; font-weight:800;
      letter-spacing:2px; text-transform:uppercase; padding:12px 32px; border-radius:999px; cursor:pointer;
      opacity:0; pointer-events:none; transition: all 0.3s; box-shadow: 0 15px 40px rgba(176,16,32,0.5);
    }
    #backbtn.vis{opacity:1;pointer-events:auto;}

    #status{position:fixed;bottom:10px;right:10px;z-index:999;font-family:monospace;font-size:9px;color:rgba(255,255,255,0.4);}
    #loading{position:fixed;inset:0;z-index:1000;background:var(--dark);display:flex;align-items:center;justify-content:center;transition:opacity .5s;}
    #loading.done{opacity:0;pointer-events:none;}
  </style>
</head>
<body>

<div id="loading">⛰️ RENDERING MOUNTAINS...</div>
<div id="status">INIT...</div>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hud-title">Plemena <span>Crne Gore</span></div>
  <div class="hud-hint" id="hint">CLICK TRIBE TO ZOOM</div>
</div>

<div id="labels"></div>

<div id="sheet">
  <div class="shead">
    <div><div class="stitle" id="stitle"></div></div>
    <button id="sc">✕</button>
  </div>
  <div class="sbody" id="sbody"></div>
</div>

<button id="backbtn">Full Map</button>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

window._ERRS = [];
window.onerror = (m) => window._ERRS.push(m);

const TRIBES = [
  { id:'vasojevici', name:'Vasojevići', color:'#4A7FC1', center:[9, 8.5], summary:'The largest tribe in Montenegro. Guardians of the northeastern frontier.', places:[{ico:'⛰️',name:'Komovi',desc:'Sacred peaks rising to 2,487m.',pos:[10,10]},{ico:'🏘️',name:'Lijeva Rijeka',desc:'The ancestral cradle.',pos:[9,7.5]}] },
  { id:'rovcani', name:'Rovčani & Morača', color:'#9B6BFF', center:[4, 7.5], summary:'Masters of the Morača River gorge.', places:[{ico:'⛪',name:'Morača Monastery',desc:'Founded in 1252.',pos:[4,7]},{ico:'🏞️',name:'Morača Canyon',desc:'Sheer 1,000m walls.',pos:[4.5,6]}] },
  { id:'drobnjaci', name:'Drobnjaci', color:'#4CAF7D', center:[0, 10.5], summary:'Warriors of the high Durmitor plateau.', places:[{ico:'🏔️',name:'Durmitor',desc:'UNESCO World Heritage massif.',pos:[0,11]},{ico:'🌊',name:'Tara Canyon',desc:'1,300m deep.',pos:[1,10]}] },
  { id:'njegusis', name:'Njeguši', color:'#C41E3A', center:[-3.5, -1.5], summary:'The historic core. Birthplace of the Petrović dynasty.', places:[{ico:'👑',name:'Cetinje',desc:'The royal capital.',pos:[-3.5,-3]},{ico:'⛰️',name:'Lovćen',desc:'The sacred mountain.',pos:[-4.5,-1]}] },
  { id:'pastrovici', name:'Paštrovići', color:'#C9A227', center:[-5.5, -7.5], summary:'The coastal tribe of Budva.', places:[{ico:'🏝️',name:'Sveti Stefan',desc:'Fortified island village.',pos:[-5,-8]},{ico:'🌊',name:'Budva',desc:'2,500 years of history.',pos:[-6,-8.5]}] }
];

try {
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0B0705);
  scene.fog = new THREE.FogExp2(0x0B0705, 0.015);

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 40, 60);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;

  scene.add(new THREE.AmbientLight(0xffffff, 2.0));
  const sun = new THREE.DirectionalLight(0xffffff, 4);
  sun.position.set(10, 50, 10);
  scene.add(sun);

  // Simple Height
  function getHeight(x, z) {
    const d = Math.sqrt(x*x + z*z);
    let h = (Math.sin(x*0.2) * Math.cos(z*0.2) * 5) + 5;
    if (z > 5) h += (z-5)*1.2;
    if (x < -5) h += (-5-x)*0.8;
    return Math.max(0, h * Math.max(0, 1 - d/25));
  }

  const geo = new THREE.PlaneGeometry(50, 50, 80, 80);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setZ(i, getHeight(pos.getX(i), pos.getY(i)));
  }
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ color: 0x443322, wireframe: false, roughness: 0.8 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  scene.add(mesh);

  const wire = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xC9A227, wireframe: true, transparent: true, opacity: 0.1 }));
  wire.rotation.x = -Math.PI / 2;
  wire.position.y = 0.1;
  scene.add(wire);

  const tribeDots = [];
  TRIBES.forEach(t => {
    const [x, z] = t.center;
    const y = getHeight(x, z) + 0.5;
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 12), new THREE.MeshStandardMaterial({ color: t.color, emissive: t.color, emissiveIntensity: 2 }));
    dot.position.set(x, y, z);
    dot.userData = { tribe: t };
    scene.add(dot);
    tribeDots.push(dot);
  });

  let selected = null, camLerp = null;

  window.addEventListener('click', e => {
    if(selected) return;
    const m = new THREE.Vector2((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
    const ray = new THREE.Raycaster();
    ray.setFromCamera(m, camera);
    const hits = ray.intersectObjects(tribeDots);
    if(hits.length) select(hits[0].object.userData.tribe);
  });

  function select(tribe) {
    selected = tribe;
    controls.autoRotate = false;
    camLerp = { pos: new THREE.Vector3(tribe.center[0], getHeight(tribe.center[0], tribe.center[1])+15, tribe.center[1]+20), look: new THREE.Vector3(tribe.center[0], 0, tribe.center[1]) };
    document.getElementById('stitle').textContent = tribe.name;
    document.getElementById('sbody').innerHTML = `<p class="ssum">${tribe.summary}</p>${tribe.places.map(p => `<div class="pcard" data-x="${p.pos[0]}" data-z="${p.pos[1]}"><div class="pico">${p.ico}</div><div><div class="pname">${p.name}</div><div class="pdesc">${p.desc}</div></div></div>`).join('')}`;
    document.getElementById('sheet').classList.add('open');
    document.getElementById('backbtn').classList.add('vis');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting) {
          e.target.classList.add('focused');
          const px = parseFloat(e.target.dataset.x), pz = parseFloat(e.target.dataset.z);
          camLerp = { pos: new THREE.Vector3(px+4, getHeight(px,pz)+10, pz+12), look: new THREE.Vector3(px, getHeight(px,pz), pz) };
        } else e.target.classList.remove('focused');
      });
    }, { root: document.getElementById('sbody'), threshold: 0.6 });
    document.querySelectorAll('.pcard').forEach(c => obs.observe(c));
  }

  document.getElementById('sc').onclick = document.getElementById('backbtn').onclick = () => {
    selected = null;
    document.getElementById('sheet').classList.remove('open');
    document.getElementById('backbtn').classList.remove('vis');
    controls.autoRotate = true;
    camLerp = { pos: new THREE.Vector3(0, 40, 60), look: new THREE.Vector3(0, 0, 0) };
  };

  let frame = 0;
  function animate() {
    requestAnimationFrame(animate);
    frame++;
    if(camLerp) {
      camera.position.lerp(camLerp.pos, 0.05);
      controls.target.lerp(camLerp.look, 0.05);
    }
    const layer = document.getElementById('labels');
    layer.innerHTML = '';
    TRIBES.forEach(t => {
      if(selected && selected !== t) return;
      const v = new THREE.Vector3(t.center[0], getHeight(t.center[0], t.center[1])+2, t.center[1]).project(camera);
      if(v.z > 1) return;
      const el = document.createElement('div');
      el.className = 'tlabel'; el.style.left = (v.x*0.5+0.5)*innerWidth+'px'; el.style.top = (-v.y*0.5+0.5)*innerHeight+'px';
      el.style.color = t.color; el.innerHTML = `<div class="tdot" style="background:${t.color}"></div><div class="tname">${t.name}</div>`;
      el.onclick = () => select(t);
      layer.appendChild(el);
    });
    controls.update();
    renderer.render(scene, camera);
    if(frame === 5) document.getElementById('loading').classList.add('done');
    document.getElementById('status').textContent = `F: ${frame} | E: r160`;
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

} catch(e) {
  document.getElementById('loading').textContent = 'ERROR: ' + e.message;
}
</script>
</body>
</html>
